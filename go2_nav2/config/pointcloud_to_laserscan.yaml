pointcloud_to_laserscan:
  ros__parameters:
    # Cloud in utlidar_lidar; project to base_link (slam_toolbox base_frame, like ref RViz).
    target_frame: base_link
    transform_tolerance: 1.0
    tf_queue_size: 30
    min_height: -0.15
    max_height: 0.40
    angle_min: -3.14159265
    angle_max: 3.14159265
    angle_increment: 0.00872665
    scan_time: 0.1
    range_min: 0.20
    range_max: 25.0
    use_inf: true
    inf_epsilon: 1.0
    concurrency_level: 1
